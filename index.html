<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSFP Petition Tracking Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  @font-face {
    font-family: 'Quasimoda';
    src: url('./Quasimoda-Medium.woff2') format('woff2');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --border: #252a38;
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.15);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.15);
    --yellow: #eab308;
    --yellow-dim: rgba(234, 179, 8, 0.1);
    --amber: #f59e0b;
    --blue-accent: #3b82f6;
    --parcel-default: rgba(100, 116, 139, 0.35);
    --parcel-signed: rgba(34, 197, 94, 0.55);
    --parcel-border-default: rgba(148, 163, 184, 0.6);
    --parcel-border-signed: rgba(34, 197, 94, 0.9);
    --magenta: #d946ef;
    --magenta-dim: rgba(217, 70, 239, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Quasimoda', 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 16px;
  }

  .header-left {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  h1 {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text);
  }

  .subtitle {
    font-family: 'Quasimoda', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .stats-bar {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }

  .stat-value {
    font-family: 'Quasimoda', monospace;
    font-size: 18px;
    font-weight: 500;
    line-height: 1;
  }

  .stat-value.green { color: var(--green); }
  .stat-value.muted { color: var(--text-muted); }

  .stat-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  .progress-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 160px;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #f59e0b, #16a34a);
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  .progress-label {
    font-family: 'Quasimoda', monospace;
    font-size: 10px;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    display: inline-block;
    margin-right: 6px;
    transition: background 0.3s;
  }
  .status-dot.live { background: var(--green); animation: pulse 2s infinite; }
  .status-dot.error { background: #ef4444; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text {
    font-family: 'Quasimoda', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  #map {
    flex: 1;
    width: 100%;
  }

  .leaflet-tile-pane { filter: none; }
  .leaflet-control-attribution { background: rgba(15,17,23,0.85) !important; color: #4b5563 !important; font-size: 9px !important; }
  .leaflet-control-attribution a { color: #6b7280 !important; }
  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--border) !important; }

  .leaflet-popup-content-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    color: var(--text);
    font-family: 'Quasimoda', 'DM Sans', sans-serif;
  }
  .leaflet-popup-tip { background: var(--surface); }
  .leaflet-popup-content { margin: 14px 16px; min-width: 200px; }

  .popup-header {
    font-family: 'Quasimoda', monospace;
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .popup-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 5px;
    font-size: 12px;
  }

  .popup-key { color: var(--text-muted); }
  .popup-val { color: var(--text); font-weight: 500; text-align: right; max-width: 160px; word-break: break-word; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-family: 'Quasimoda', monospace;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .badge-yes { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .badge-no-explicit { background: var(--red-dim); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .badge-abstain { background: rgba(217,70,239,0.15); color: #d946ef; border: 1px solid rgba(217,70,239,0.3); }
  .badge-city { background: rgba(15, 136, 168,0.15); color: #0F88A8; border: 1px solid rgba(15, 136, 168,0.3); }
  .badge-no { background: rgba(100,116,139,0.15); color: var(--text-muted); border: 1px solid var(--border); }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 9999;
    transition: opacity 0.4s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }

  .loader-label {
    font-family: 'Quasimoda', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-banner {
    display: none;
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.4);
    color: #fca5a5;
    font-family: 'Quasimoda', monospace;
    font-size: 11px;
    padding: 8px 16px;
    border-radius: 4px;
    z-index: 1000;
    max-width: 500px;
    text-align: center;
  }

  .legend {
    position: absolute;
    bottom: 24px;
    left: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    z-index: 800;
    font-size: 11px;
  }
  .legend-title {
    font-family: 'Quasimoda', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .swatch-signed  { background: rgba(34,197,94,0.5);  border: 1.5px solid #16a34a; }
  .swatch-no      { background: rgba(239,68,68,0.4);  border: 1.5px solid #ef4444; }
  .swatch-abstain { background: rgba(217,70,239,0.4); border: 1.5px solid #d946ef; }
  .swatch-city      { background: rgba(15, 136, 168,0.4);  border: 1.5px solid #0F88A8; }
  .swatch-unsigned{ background: rgba(245,158,11,0.25); border: 1.5px solid #d97706; }

  .refresh-btn {
    background: var(--border);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'Quasimoda', monospace;
    font-size: 10px;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .refresh-btn:hover { background: var(--blue-accent); color: white; border-color: var(--blue-accent); }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loader-label" id="loadingMsg">Loading parcels…</div>
</div>

<div class="error-banner" id="errorBanner"></div>

<header>
  <div class="header-left">
    <h1>DSFP Petition Tracking</h1>
    <span class="subtitle">BID Renewal &amp; Expansion</span>
  </div>

  <div class="stats-bar">
    <div class="stat">
      <span class="stat-value green" id="statSigned">—</span>
      <span class="stat-label">Signed</span>
    </div>
    <div class="stat">
      <span class="stat-value muted" id="statTotal">—</span>
      <span class="stat-label">Total Parcels</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="statPct" style="color:#f59e0b;">—</span>
      <span class="stat-label">% Assessment</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-label">
        <span>Toward 30% threshold</span>
        <span id="progressPct">0%</span>
      </div>
    </div>
    <div>
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Loading…</span>
    </div>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>

<div id="map"></div>

<div class="legend">
  <div class="legend-title">Petition Status</div>
  <div class="legend-item"><div class="legend-swatch swatch-signed"></div>Signed (Yes)</div>
  <div class="legend-item"><div class="legend-swatch swatch-no"></div>Declined (No)</div>
  <div class="legend-item"><div class="legend-swatch swatch-city"></div>City Property</div>
  <div class="legend-item"><div class="legend-swatch swatch-abstain"></div>Abstain</div>
  <div class="legend-item"><div class="legend-swatch swatch-unsigned"></div>Not yet signed</div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const GEOJSON_URL = "https://raw.githubusercontent.com/downtownsfpartnership/dsfp-petition-map/main/MAP_3_19_Renewal_Expansion.geojson";
const SHEET_ID    = "1fN4u7AA5QQQNs5p4Zi9N2mJwpF3hhLTYVKlA3Q1k2zY";
const SHEET_GID   = "1106530303";
const BLKLOT_GEO  = "blklot";
const BLKLOT_SHT  = "blklot";
const STATUS_COL  = "Petition Tracking";

// ── MAP INIT ─────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 20
  }).addTo(map);

let geojsonLayer = null;

// ── HELPERS ──────────────────────────────────────────────────────────────────
function setStatus(state, msg) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot ' + state;
  txt.textContent = msg;
}

function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 6000);
}

function setLoading(msg) {
  document.getElementById('loadingMsg').textContent = msg;
  document.getElementById('loadingOverlay').classList.remove('hidden');
}

function hideLoading() {
  document.getElementById('loadingOverlay').classList.add('hidden');
}

// signedPct is a direct percentage value (e.g. 15.41 means 15.41%)
// threshold is 30 (percent), so progress = signedPct / 30
function updateStats(signed, total, signedPct) {
  document.getElementById('statSigned').textContent = signed.toLocaleString();
  document.getElementById('statTotal').textContent  = total.toLocaleString();
  const pctOfThreshold = Math.min((signedPct / 30) * 100, 100);
  const pctDisplay = signedPct.toFixed(2) + '%';
  document.getElementById('progressFill').style.width = pctOfThreshold + '%';
  document.getElementById('statPct').textContent = pctDisplay;
  document.getElementById('progressPct').textContent  = pctDisplay + ' signed';
}

// ── FETCH SHEET CSV ──────────────────────────────────────────────────────────
async function fetchSheetData() {
  const url = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTdt7C19LESnicFSoaMqgBNNNc37yCxxTVxG-hehWBINREGx2Yh8Mgp63bBSDqyYFKh3U0gxOXz8xKV/pub?gid=1106530303&single=true&output=csv&cachebust=${Date.now()}`;
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error(`Sheet fetch failed: ${res.status}`);
  const text = await res.text();

  const rows = text.trim().split('\n').map(r => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < r.length; i++) {
      const c = r[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    return cols;
  });

  if (rows.length < 2) throw new Error('Sheet appears empty');

  const headers = rows[0].map(h => h.replace(/^"|"$/g, '').trim());
  const blklotIdx   = headers.findIndex(h => h.toLowerCase() === BLKLOT_SHT.toLowerCase());
  const statusIdx   = headers.findIndex(h => h.toLowerCase() === STATUS_COL.toLowerCase());
  const addressIdx  = headers.findIndex(h => h.toLowerCase().includes('address'));
  const totalPctIdx = headers.findIndex(h => h.toLowerCase().includes('total percentage'));

  if (blklotIdx === -1) throw new Error(`Column "${BLKLOT_SHT}" not found. Headers: ${headers.join(', ')}`);
  if (statusIdx === -1) throw new Error(`Column "${STATUS_COL}" not found. Headers: ${headers.join(', ')}`);

  const lookup = {};

  // ── Compute signedPct directly from the sheet here, with no GeoJSON dependency.
  // This is the single source of truth for the percentage.
  let signedPctFromSheet = 0;
  let signedCountFromSheet = 0;

  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    const id  = row[blklotIdx]?.replace(/^"|"$/g, '').trim();
    if (!id) continue;

    const status = (row[statusIdx] || '').replace(/^"|"$/g, '').trim().toLowerCase();

    const rawPct = totalPctIdx >= 0
      ? (row[totalPctIdx] || '').replace(/^"|"$/g, '').replace('%', '').trim()
      : '0';
    const totalPct = parseFloat(rawPct) || 0;

    // Sum percentage for yes rows directly from sheet
    if (status === 'yes') {
      signedPctFromSheet += totalPct;
      signedCountFromSheet++;
    }

    lookup[id] = {
      status:   (row[statusIdx] || '').replace(/^"|"$/g, '').trim(),
      address:  addressIdx >= 0 ? (row[addressIdx] || '').replace(/^"|"$/g, '').trim() : '',
      totalPct
    };
  }

  // Attach the sheet-computed totals so renderMap can use them directly
  lookup.__sheetSignedPct   = signedPctFromSheet;
  lookup.__sheetSignedCount = signedCountFromSheet;

  return lookup;
}

// ── FETCH GEOJSON ────────────────────────────────────────────────────────────
async function fetchGeoJSON() {
  const res = await fetch(GEOJSON_URL);
  if (!res.ok) throw new Error(`GeoJSON fetch failed: ${res.status}`);
  return res.json();
}

// ── PARCEL STATUS HELPER ─────────────────────────────────────────────────────
function geoVal(v) { return String(v || '').replace(/^'|'$/g, '').trim(); }
function getStatus(feature, lookup) {
  const id = geoVal(feature.properties?.[BLKLOT_GEO]);
  const rec = lookup[id];
  const raw = (rec?.status || geoVal(feature.properties?.['Petition Tracking'])).trim().toLowerCase();
  if (raw === 'abstain') return 'abstain';
  if (raw === 'yes') return 'yes';
  if (raw === 'no')  return 'no';
  if (raw === 'city property') return 'city property';
  return 'pending';
}

function getParcelStyle(status) {
  if (status === 'yes') return { fillColor: '#16a34a', fillOpacity: 0.7, color: '#16a34a', weight: 2, opacity: 1 };
  if (status === 'no')  return { fillColor: '#ef4444', fillOpacity: 0.4, color: '#ef4444', weight: 2, opacity: 1 };
  if (status === 'abstain') return { fillColor: '#d946ef', fillOpacity: 0.45, color: '#d946ef', weight: 2, opacity: 1 };
  if (status === 'city property')  return { fillColor: '#0F88A8', fillOpacity: 0.5, color: '#0F88A8', weight: 2, opacity: 1 };
  if (status === 'partial') return { fillColor: 'url(#hatch-green)', fillOpacity: 1, color: '#16a34a', weight: 2, opacity: 1, className: 'parcel-partial' };
  return                       { fillColor: '#f59e0b', fillOpacity: 0.15, color: '#d97706', weight: 1, opacity: 0.8 };
}

// ── RENDER MAP ───────────────────────────────────────────────────────────────
function renderMap(geojson, lookup) {
  if (geojsonLayer) { map.removeLayer(geojsonLayer); }

  if (!document.getElementById('hatch-svg-defs')) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.id = 'hatch-svg-defs';
    svg.setAttribute('style', 'position:absolute;width:0;height:0;overflow:hidden');
    svg.innerHTML = `<defs>
      <pattern id="hatch-green" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
        <line x1="0" y1="0" x2="0" y2="8" stroke="#22c55e" stroke-width="2.5" stroke-opacity="0.9"/>
      </pattern>
    </defs>`;
    document.body.appendChild(svg);
  }

  const boundaryStatuses = {};
  const boundaryKeys = new Map(); // feature index → coords key

  geojson.features.forEach((f, i) => {
    const coords = JSON.stringify(f.geometry?.coordinates);
    const id = geoVal(f.properties?.[BLKLOT_GEO]);
    const rec = lookup[id];
    // Only push a status if this blklot actually exists in the sheet
    if (rec) {
      const raw = rec.status.replace(/^"|"$/g, '').trim().toLowerCase();
      const status = raw === 'yes' ? 'yes' : raw === 'no' ? 'no' : raw === 'city property' ? 'city property' : raw === 'abstain' ? 'abstain' : 'pending';
      if (!boundaryStatuses[coords]) boundaryStatuses[coords] = [];
      boundaryStatuses[coords].push(status);
    }
    boundaryKeys.set(i, coords);
  });

  // TARGETED DEBUG
  const ids345 = ['0261018','0261019','0261020'];
  ids345.forEach(id => console.log(id, '→ lookup:', lookup[id]?.status, '| rec exists:', !!lookup[id]));
  const coords345 = JSON.stringify(geojson.features.find(f => geoVal(f.properties?.blklot) === '0261018')?.geometry?.coordinates);
  console.log('345 boundary statuses:', boundaryStatuses[coords345]);
  let total = 0;

  // Use the sheet-computed values directly — no GeoJSON matching needed for the percentage
  const signedPct   = lookup.__sheetSignedPct;
  const signedCount = lookup.__sheetSignedCount;

  geojsonLayer = L.geoJSON(geojson, {
    style: feature => {
      const coords = JSON.stringify(feature.geometry?.coordinates);
      const statuses = boundaryStatuses[coords] || [];
      const nonPendingStatuses = statuses.filter(s => s !== 'pending');
      const hasYes = statuses.some(s => s === 'yes');
      const allYes = statuses.every(s => s === 'yes');
      const FORCE_FULL_GREEN = new Set(['0261018','0261019','0261020']);
      const FORCE_GREEN_PRIMARY = '0261018';
      const id0 = geoVal(feature.properties?.[BLKLOT_GEO]);
      const isPartial = !allYes && hasYes && !FORCE_FULL_GREEN.has(id0);
      if (FORCE_FULL_GREEN.has(id0) && id0 !== FORCE_GREEN_PRIMARY) {
        return { fillColor: 'transparent', fillOpacity: 0, color: 'transparent', weight: 0, opacity: 0 };
      }
      const effectiveStatus = isPartial ? 'partial' : getStatus(feature, lookup);
      return getParcelStyle(effectiveStatus);
    },
    onEachFeature: (feature, layer) => {
      total++;
      const id     = geoVal(feature.properties?.[BLKLOT_GEO]);
      const rec    = lookup[id];
      const status = getStatus(feature, lookup);

      const address    = geoVal(feature.properties?.['Site Address']) || rec?.address || '—';
      const ballotVote = geoVal(feature.properties?.['2026 Ballot Vote']) || '—';

      const statusBadge =
        status === 'yes' ? `<span class="badge badge-yes">Yes</span>` :
        status === 'no'  ? `<span class="badge badge-no-explicit">No</span>` :
        status === 'abstain' ? `<span class="badge badge-abstain">Abstain</span>` :
        status === 'city property'  ? `<span class="badge badge-city">City Property</span>` :
                           `<span class="badge badge-no">Not signed</span>`;

      layer.bindPopup(`
        <div class="popup-header">${id}</div>
        <div class="popup-row"><span class="popup-key">Address</span><span class="popup-val">${address}</span></div>
        <div class="popup-row"><span class="popup-key">Petition</span><span class="popup-val">${statusBadge}</span></div>
        <div class="popup-row"><span class="popup-key">2026 Ballot</span><span class="popup-val">${ballotVote}</span></div>
      `, { maxWidth: 280 });

      layer.on('mouseover', function() {
        const s = getParcelStyle(status);
        this.setStyle({ ...s, fillOpacity: s.fillOpacity + 0.15, weight: 2.5 });
      });
      layer.on('mouseout', function() {
        geojsonLayer.resetStyle(this);
      });
    }
  }).addTo(map);

  map.fitBounds(geojsonLayer.getBounds(), { padding: [24, 24] });
  updateStats(signedCount, total, signedPct);

  const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  setStatus('live', `Updated ${now}`);
}

// ── MAIN LOAD ─────────────────────────────────────────────────────────────────
async function loadData() {
  setStatus('', 'Loading…');
  setLoading('Loading parcels…');

  try {
    document.getElementById('loadingMsg').textContent = 'Fetching GeoJSON…';
    const [geojson, lookup] = await Promise.all([fetchGeoJSON(), fetchSheetData()]);
    document.getElementById('loadingMsg').textContent = 'Rendering map…';
    renderMap(geojson, lookup);
    hideLoading();
  } catch (err) {
    hideLoading();
    setStatus('error', 'Load failed');
    showError('Error: ' + err.message);
    console.error(err);
  }
}

loadData();
</script>
